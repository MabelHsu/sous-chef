name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      # UI (AppTest) tests run locally; CI runs the fast deterministic suite
      - run: python -m pytest -q -k "not app_ui"
      - run: python -m py_compile app.py sous_core.py forecast.py agents/*.py scripts/*.py
